<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zee AI (Groq)</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  display: none;
}

.msg {
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 80%;
}

.user { background: #2563eb; align-self: flex-end; }
.bot { background: #1f2937; align-self: flex-start; }

#inputBox {
  display: none;
  padding: 10px;
  background: #111;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
  border-radius: 8px;
}

button {
  margin-left: 10px;
  padding: 10px;
  border: none;
  background: #2563eb;
  color: white;
  border-radius: 8px;
}

#setup {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
  padding: 20px;
}

#setup input {
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div id="setup">
  <h2>Enter Groq API Key</h2>
  <input id="apiKeyInput" placeholder="Paste your API key here..." />
  <button onclick="connect()">Connect</button>
</div>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Ask anything..." />
  <button onclick="send()">Send</button>
</div>

<script>
let API_KEY = "";

function connect() {
  const key = document.getElementById("apiKeyInput").value.trim();
  if (!key) return alert("Enter API key");

  API_KEY = key;

  document.getElementById("setup").style.display = "none";
  document.getElementById("chat").style.display = "block";
  document.getElementById("inputBox").style.display = "flex";
}

async function send() {
  const input = document.getElementById("input");
  if (!input.value) return;

  addMessage(input.value, "user");

  const userText = input.value;
  input.value = "";

  const loading = addMessage("Thinking...", "bot");

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "llama3-70b-8192",
        messages: [
          { role: "user", content: userText }
        ]
      })
    });

    const data = await res.json();
    loading.remove();

    const reply = data.choices[0].message.content;
    addMessage(reply, "bot");

  } catch (e) {
    loading.innerText = "Error connecting...";
  }
}

function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const msg = document.createElement("div");
  msg.className = "msg " + type;
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  return msg;
}
</script>

</body>
</html>
